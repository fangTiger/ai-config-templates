[pytest]
testpaths = tests/e2e
markers =
    api: API 端到端测试
    ui: 前端 UI 测试
    integration: 后端集成测试
    evaluation: AI/模型评测
    smoke: 冒烟测试（快速验证核心路径）
    slow: 慢速测试 (>30s)
    flaky: 已知不稳定测试（附原因）
    critical: 关键业务路径

addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider

# JUnit XML 输出
junit_family = xunit2
junit_suite_name = e2e_tests
