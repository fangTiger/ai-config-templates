# 项目级 Codex 配置
# 运行时入口和完整 Python-first 流程以项目根 AGENTS.md 为主。
# 使用 switch-plugin_codex.sh 落盘时，对应 profile 目录是持久生成源。
model = "gpt-5.5"
model_provider = "openai"
model_reasoning_effort = "xhigh"

[agents]
max_threads = 6
max_depth = 1

# 推荐启动命令：
#   /path/to/ai-config-templates/scripts/switch-plugin_codex.sh codex-codex-python-dev
# 启动后建议顺序：
#   1. 读取项目根 AGENTS.md
#   2. 对 Python 任务运行 .codex/tools/detect-python-project.sh
#   3. 任务匹配时读取 .codex/skills、.codex/agents/worker-codex.toml 或 .codex/agents/review-codex.toml
