# 项目级 Codex 配置
# 本文件只保留轻量启动说明。
# 项目运行时入口以 AGENTS.md 为主。
# 使用 switch-plugin_codex.sh 落盘时，对应 profile 目录是持久生成源。
[agents]
max_threads = 6
max_depth = 1

# 推荐启动命令：
#   /path/to/ai-config-templates/scripts/switch-plugin_codex.sh codex-codex-dev
# 启动后建议顺序：
#   1. 读取项目根 AGENTS.md
#   2. 如任务为中/大、涉及 handoff/review，继续阅读 .codex/workflow.md
#   3. 再按 AGENTS.md 指向阅读 CODE_WIKI / docs / openspec
